<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="topbar" th:fragment="header">
    <div class="topbar__inner">
        <a class="brand" th:href="@{/tests}">Система тестирования</a>
        <nav class="nav">
            <a th:href="@{/tests}">Тесты</a>
            <a th:href="@{/history}" sec:authorize="isAuthenticated()">История</a>
            <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')">Администрирование</a>
        </nav>
        <div class="account">
            <span sec:authorize="isAuthenticated()" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="link-button" type="submit">Выйти</button>
            </form>
            <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Войти</a>
            <a th:href="@{/register}" sec:authorize="!isAuthenticated()">Регистрация</a>
        </div>
    </div>
</header>
</body>
</html>
