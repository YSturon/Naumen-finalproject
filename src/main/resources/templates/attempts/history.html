<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>История попыток</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <div class="page-heading">
        <h1>История попыток</h1>
    </div>
    <p class="notice" th:if="${attempts.isEmpty()}">История пока пуста.</p>
    <div class="table-wrap" th:if="${!attempts.isEmpty()}">
        <table>
            <thead>
            <tr>
                <th>Тест</th>
                <th>Тема</th>
                <th>Дата</th>
                <th>Результат</th>
                <th>Оценка</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="attempt : ${attempts}">
                <td th:text="${attempt.test.title}"></td>
                <td th:text="${attempt.test.topic.name}"></td>
                <td th:text="${#temporals.format(attempt.startedAt, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${attempt.finished ? attempt.percent + '%' : 'Не завершено'}"></td>
                <td th:text="${attempt.grade}"></td>
                <td><a th:href="@{/history/{id}(id=${attempt.id})}">Открыть</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
