<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вопросы</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <a class="back-link" th:href="@{/admin/tests}">← К тестам</a>
    <div class="page-heading">
        <div>
            <p class="eyebrow" th:text="${test.topic.name}"></p>
            <h1 th:text="${test.title}"></h1>
        </div>
        <a class="primary" th:href="@{/admin/tests/{id}/questions/new(id=${test.id})}">Добавить вопрос</a>
    </div>
    <p class="notice error" th:if="${error}" th:text="${error}"></p>
    <p class="notice" th:if="${questions.isEmpty()}">Вопросы еще не добавлены.</p>
    <div class="question-admin-list">
        <article class="panel" th:each="question, stat : ${questions}">
            <div class="question-head">
                <span th:text="${'Вопрос ' + (stat.index + 1)}"></span>
                <span th:text="${question.type.displayName + ', ' + question.points + ' балл(ов)'}"></span>
            </div>
            <h2 th:text="${question.text}"></h2>
            <ul class="plain-list">
                <li th:each="option : ${question.options}">
                    <span th:text="${option.text}"></span>
                    <strong th:if="${option.correct}">правильный</strong>
                </li>
            </ul>
            <div class="button-row">
                <a class="secondary" th:href="@{/admin/questions/{id}/edit(id=${question.id})}">Изменить</a>
                <form th:action="@{/admin/questions/{id}/delete(id=${question.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="danger" type="submit">Удалить</button>
                </form>
            </div>
        </article>
    </div>
</main>
</body>
</html>
