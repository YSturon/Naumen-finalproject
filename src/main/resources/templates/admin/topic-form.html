<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${mode == 'create' ? 'Новая тема' : 'Редактирование темы'}">Тема</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container narrow">
    <a class="back-link" th:href="@{/admin/topics}">← К темам</a>
    <section class="panel">
        <h1 th:text="${mode == 'create' ? 'Новая тема' : 'Редактирование темы'}"></h1>
        <form class="form"
              th:action="${mode == 'create'} ? @{/admin/topics} : @{/admin/topics/{id}(id=${topic.id})}"
              th:object="${topicForm}"
              method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Название
                <input th:field="*{name}" type="text" required>
                <span class="field-error" th:errors="*{name}"></span>
            </label>
            <label>
                Описание
                <textarea th:field="*{description}" rows="5"></textarea>
                <span class="field-error" th:errors="*{description}"></span>
            </label>
            <button class="primary" type="submit">Сохранить</button>
        </form>
    </section>
</main>
</body>
</html>
