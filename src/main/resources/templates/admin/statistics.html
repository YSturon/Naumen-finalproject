<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Статистика</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <div class="page-heading">
        <h1>Статистика по тестам</h1>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Тест</th>
                <th>Тема</th>
                <th>Попыток</th>
                <th>Средний балл</th>
                <th>Успешность</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${statistics}">
                <td th:text="${row.testTitle}"></td>
                <td th:text="${row.topicName}"></td>
                <td th:text="${row.attempts}"></td>
                <td th:text="${#numbers.formatDecimal(row.averagePercent, 1, 1) + '%'}"></td>
                <td th:text="${#numbers.formatDecimal(row.successRate, 1, 1) + '%'}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
