<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тесты</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<main class="container">
    <div class="page-heading">
        <h1>Тесты</h1>
        <a class="primary" th:href="@{/admin/tests/new}">Создать тест</a>
    </div>
    <p class="notice error" th:if="${error}" th:text="${error}"></p>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Название</th>
                <th>Тема</th>
                <th>Вопросы</th>
                <th>Время</th>
                <th>Статус</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="test : ${tests}">
                <td th:text="${test.title}"></td>
                <td th:text="${test.topic.name}"></td>
                <td th:text="${test.questionCount}"></td>
                <td th:text="${test.timeLimitMinutes + ' мин'}"></td>
                <td>
                    <span class="status" th:classappend="${test.published} ? ' status-ok' : ''"
                          th:text="${test.published ? 'Опубликован' : 'Скрыт'}"></span>
                </td>
                <td class="actions wide">
                    <a th:href="@{/admin/tests/{id}/questions(id=${test.id})}">Вопросы</a>
                    <a th:href="@{/admin/tests/{id}/edit(id=${test.id})}">Изменить</a>
                    <form th:action="@{/admin/tests/{id}/toggle-published(id=${test.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="link-button" type="submit" th:text="${test.published ? 'Скрыть' : 'Опубликовать'}"></button>
                    </form>
                    <form th:action="@{/admin/tests/{id}/delete(id=${test.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger-link" type="submit">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
